<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DashTrack Ultra | Live Sync Asset</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --surface: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--surface);
            color: var(--text); height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #map { flex: 1; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        .ui-overlay {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 16px;
        }

        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            pointer-events: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .top-bar { align-self: center; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: 0.3s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .dash-card { width: 100%; max-width: 440px; margin: 0 auto; padding: 24px; }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .progress-bar { height: 6px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--primary); transition: 0.8s ease; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { 
            flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 700; 
            cursor: pointer; transition: 0.2s; font-size: 0.85rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay">
    <div class="top-bar glass">
        <div id="status-dot" class="dot"></div>
        <span style="font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;" id="status-msg">NETWORK IDLE</span>
    </div>

    <div class="dash-card glass">
        <div class="header-row">
            <div>
                <div style="color: #94a3b8; font-size: 0.7rem; font-weight: 700;">ETA</div>
                <div id="eta-val" style="font-size: 1.4rem; font-weight: 800;">Waiting...</div>
            </div>
            <div style="text-align: right;">
                <div style="color: var(--accent); font-weight: 800; font-size: 1.2rem;">$3,000 IP</div>
                <div style="color: #94a3b8; font-size: 0.6rem;">LIVE ASSET V2.0</div>
            </div>
        </div>

        <div class="progress-bar"><div id="fill"></div></div>

        <div id="setup-controls" class="btn-group">
            <button class="btn btn-primary" onclick="initNode('driver')">I AM DRIVER</button>
            <button class="btn btn-secondary" onclick="initNode('customer')">I AM CUSTOMER</button>
        </div>
        
        <div id="active-controls" class="btn-group" style="display:none;">
            <button class="btn btn-secondary" onclick="location.reload()">RESET SYSTEM</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- ROOT KEY INTEGRATED ---
    const ABLY_KEY = 'PNpc2Q.4eXn2Q:U675UAJFLTFcQkXBnQ23g_N-toAzurH075ov0Qpj_4E'; 
    const DESTINATION = [6.5244, 3.3792]; // Set to Lagos, Nigeria coordinates for your demo
    
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('delivery-live');
    
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(DESTINATION, 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const driverMarker = L.marker([0,0], { icon: L.divIcon({ html: '<div style="font-size:25px">🛵</div>', className: 'm-icon', iconSize: [30,30] })}).addTo(map);
    L.marker(DESTINATION, { icon: L.divIcon({ html: '<div style="font-size:25px">🏠</div>', className: 'm-icon', iconSize: [30,30] })}).addTo(map);

    // Connection Check
    ably.connection.on('connected', () => {
        document.getElementById('status-msg').innerText = "NETWORK READY";
        document.getElementById('status-dot').style.background = "#6366f1";
    });

    function initNode(role) {
        document.getElementById('setup-controls').style.display = 'none';
        document.getElementById('active-controls').style.display = 'flex';
        document.getElementById('status-dot').classList.add('active');
        
        if (role === 'driver') {
            document.getElementById('status-msg').innerText = "TRANSMITTING LIVE";
            navigator.geolocation.watchPosition(pos => {
                const data = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                driverMarker.setLatLng([data.lat, data.lng]);
                map.panTo([data.lat, data.lng]);
                
                // PUBLISH TO CUSTOMER
                channel.publish('gps', data);
                updateUI(data.lat, data.lng);
            }, (err) => {
                alert("Please use HTTPS and enable Location Services!");
            }, { enableHighAccuracy: true });
        } else {
            document.getElementById('status-msg').innerText = "LISTENING FOR DRIVER";
            // SUBSCRIBE TO DRIVER
            channel.subscribe('gps', msg => {
                driverMarker.setLatLng([msg.data.lat, msg.data.lng]);
                map.panTo([msg.data.lat, msg.data.lng]);
                updateUI(msg.data.lat, msg.data.lng);
            });
        }
    }

    function updateUI(lat, lng) {
        const d = getDist(lat, lng, DESTINATION[0], DESTINATION[1]);
        document.getElementById('eta-val').innerText = d < 0.05 ? "AT DESTINATION" : Math.round(d * 4) + " MINS";
        document.getElementById('fill').style.width = Math.min(100, (1 - d/2) * 100) + "%";
    }

    function getDist(l1, n1, l2, n2) {
        const R = 6371;
        const dLat = (l2-l1)*Math.PI/180;
        const dLon = (n2-n1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
</script>
</body>
</html>
